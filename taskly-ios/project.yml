name: Taskly
options:
  bundleIdPrefix: com.taskly
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: K65RWCXUXM
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES

packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire
    from: "5.9.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "7.10.0"
  stripe-ios-spm:
    url: https://github.com/stripe/stripe-ios-spm
    from: "23.18.0"

targets:
  Taskly:
    type: application
    platform: iOS
    sources:
      - path: Sources/Taskly
        excludes:
          - Info.plist
    info:
      path: Sources/Taskly/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taskly.app
        INFOPLIST_FILE: Sources/Taskly/Info.plist
    dependencies:
      - package: Alamofire
      - package: Kingfisher
      - package: stripe-ios-spm
        product: StripePaymentSheet
      - package: stripe-ios-spm
        product: StripeApplePay
    entitlements:
      path: Sources/Taskly/Taskly.entitlements
